baseURL = 'https://akrmio.com/blog/'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
languageCode = 'en'
title = 'AKRMIO Blog'
publishDir = 'public'
relativeURLs = false
canonifyURLs = false
theme = "PaperMod"

disablePathToLower = true

[taxonomies]
  pillar = "pillar"
  cluster = "clusters"

[languages]
  [languages.en]
    weight = 1
    languageName = "English"
    contentDir = "content"
    [languages.en.params]
      [languages.en.params.homeInfoParams]
        Title = "AKRMIO Blog"
        Content = """AI API cost optimization & model selection guides for developers. Covering DeepSeek, GPT-4o, Claude, MiniMax and other major LLM APIs — helping you run higher quality at lower cost.

👉 [Back to main site](https://akrmio.com/) · [Articles](/posts/)"""
    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Articles"
      url = "/posts/"
      weight = 2
    [[languages.en.menu.main]]
      name = "Topics"
      url = "/pillar/"
      weight = 3
    [[languages.en.menu.main]]
      name = "AKRMIO"
      url = "https://akrmio.com/"
      weight = 4
    [[languages.en.menu.main]]
      name = "繁體中文"
      url = "/zh-tw/"
      weight = 5

  [languages.zh-tw]
    weight = 2
    languageName = "繁體中文"
    contentDir = "content.zh-tw"
    [languages.zh-tw.params]
      description = "AKRMIO Blog 繁體中文版"
      [languages.zh-tw.params.homeInfoParams]
        Title = "AKRMIO Blog"
        Content = """AI API 成本優化與模型選型實戰指南。覆蓋 DeepSeek、GPT-4o、Claude、MiniMax 等主流大模型 API，幫你用更低成本跑出更高品質。

👉 [返回主站](https://akrmio.com/) · [文章列表](/zh-tw/posts/)"""

    [[languages.zh-tw.menu.main]]
      name = "首頁"
      url = "/zh-tw/"
      weight = 1
    [[languages.zh-tw.menu.main]]
      name = "文章"
      url = "/zh-tw/posts/"
      weight = 2
    [[languages.zh-tw.menu.main]]
      name = "主題"
      url = "/zh-tw/pillar/"
      weight = 3
    [[languages.zh-tw.menu.main]]
      name = "English"
      url = "/posts/"
      weight = 4

[params]
  env = "production"
  description = "AKRMIO Blog - AI API cost optimization & model guides for developers"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSiteTerm = true
  disableSpecial1stPost = true
  ShowToc = true
  TocOpen = true
  mainSections = ["posts"]
  DateFormat = "2006-01-02"

  [params.assets]
    favicon = "/favicon.ico"
    disableScrollBarStyle = false
    disableFingerprinting = false

  [params.authors]
    default = "AKRMIO Team"

[params.profileMode]
  enabled = false

[params.socialIcons]
  # 暂时留空，等 GitHub/Twitter 账号就绪再加

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = true
  style = "monokai"
  tabWidth = 2

[markup.goldmark.renderer]
  unsafe = true

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "主题"
    url = "/pillar/"
    weight = 3
  [[menu.main]]
    name = "AKRMIO"
    url = "https://akrmio.com/"
    weight = 4
