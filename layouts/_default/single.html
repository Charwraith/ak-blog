{{ define "title" }}{{ .Title }}{{ end }}
{{ define "main" }}
<article class="post">
  <header>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    </div>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
  <footer>
    {{ if or .Params.pillar .Params.clusters }}
    <section class="related-posts">
      <h2>相关文章</h2>
      {{ partial "related-posts.html" . }}
    </section>
    {{ end }}
  </footer>
</article>
{{ end }}
